{% extends "layout.html" %}

{% block title %}{% endblock %}

{% block content %}
    
<h2> Report </h2>
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Count</th>
    </tr>
    </thead>
    <tbody>
    {% for username, count in groups %}
        <tr>
            <td>{{username}}</td>
            <td>{{count}}</td>
        </tr>
    {% endfor%}
    </tbody>
</table>

{% endblock %}
